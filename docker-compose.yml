# Docker Compose for local development and staging.
# For production, inject environment variables through your platform's secrets manager.
# Do NOT commit .env files containing real credentials.

services:
  backend:
    build:
      context: ./toureez-backend
      dockerfile: Dockerfile
    container_name: toureez-backend
    restart: unless-stopped

    # Load environment variables from the .env file next to docker-compose.yml.
    # Copy toureez-backend/.env.example → .env and fill in real values before running.
    env_file:
      - ./toureez-backend/.env

    ports:
      - "${PORT:-3000}:3000"

    # Use node to run the health check — wget is not available in node:20-alpine.
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/v1/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    # Prevent container from gaining additional privileges at runtime.
    security_opt:
      - no-new-privileges:true
