name: CI

# Run on every pull request and every push to main.
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  # ── Job 1: Lint ─────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: toureez-backend/package-lock.json

      - name: Install backend deps
        working-directory: toureez-backend
        run: npm ci --frozen-lockfile

      - name: Lint backend
        working-directory: toureez-backend
        run: npx eslint "src/**/*.ts" --max-warnings 0


  # ── Job 2: Type-check ────────────────────────────────────────────────────────
  typecheck:
    name: Type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: toureez-backend/package-lock.json

      - name: Install backend deps
        working-directory: toureez-backend
        run: npm ci --frozen-lockfile

      - name: Type-check backend
        working-directory: toureez-backend
        run: npx tsc --noEmit

  # ── Job 3: Build ─────────────────────────────────────────────────────────────
  build:
    name: Build backend
    runs-on: ubuntu-latest
    needs: [typecheck]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: toureez-backend/package-lock.json

      - name: Install backend deps
        working-directory: toureez-backend
        run: npm ci --frozen-lockfile

      - name: Build backend
        working-directory: toureez-backend
        run: npm run build

      - name: Verify dist/server.js exists
        run: test -f toureez-backend/dist/server.js

  # ── Job 4: Test ──────────────────────────────────────────────────────────────
  test:
    name: Test backend
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: toureez-backend/package-lock.json

      - name: Install backend deps
        working-directory: toureez-backend
        run: npm ci --frozen-lockfile

      - name: Run tests
        working-directory: toureez-backend
        run: npm test

  # ── Job 5: Security audit ────────────────────────────────────────────────────
  audit:
    name: Security audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: toureez-backend/package-lock.json

      - name: Install backend deps
        working-directory: toureez-backend
        run: npm ci --frozen-lockfile

      - name: npm audit (backend)
        working-directory: toureez-backend
        run: npm audit --audit-level=high
